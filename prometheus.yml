global:
  scrape_interval: 2s
  evaluation_interval: 2s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: anomaly_app
    static_configs:
      - targets: ["anomaly_app:8000"]
  - job_name: log_anomaly_ml
    static_configs:
      - targets: ["log_anomaly_ml:8200"]
  - job_name: drain3
    static_configs:
      - targets: ["drain3:8300"]

